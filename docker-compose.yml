services:
  jenkins:
    container_name: jenkins
    image: jenkins/jenkins:2.516.1-lts-jdk21
    restart: always
    ports:
      - "9999:8080"
    networks:
      - jenkins_network
    volumes:
      - jenkins:/var/jenkins_home
volumes:
  jenkins:
networks:
  jenkins_network:
    external: true
    name: global-jenkins-network
