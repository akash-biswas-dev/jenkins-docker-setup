services:
  jenkins:
    container_name: jenkins
    image: jenkins/jenkins:2.541-alpine-jdk21
    restart: always
    ports:
      - "9999:8080"
    networks:
      - jenkins_network
    volumes:
      - jenkins:/var/jenkins_home
  docker-agent:
    container_name: docker-agent
    image: biswasakash/docker-ssh-agent:latest
    privileged: true
    environment:
      - JENKINS_PUBLIC_KEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIM62ZFyBTRyr6tbGzpZcxfsBtofJQ0XXq3+VQspzLY4I akash@workstation
    networks:
      - jenkins_network
volumes:
  jenkins:
networks:
  jenkins_network:
    external: true
    name: jenkins-global-network
